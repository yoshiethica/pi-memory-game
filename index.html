<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Pi Memory</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <h1>PI Memory</h1>
  <p>円周率を覚えるウェブアプリ</p>

  <div class="layout">
    <div class="left-panel">

      <section>
        <h2>Mode</h2>

        <div id="mode-row">
          <label>
            <input id="mode-practice" type="radio" name="mode" value="practice" checked>
            Practice Mode
          </label>
          <label>
            <input id="mode-challenge" type="radio" name="mode" value="challenge">
            Challenge Mode
          </label>

          <label for="max-mistakes" class="mistake-limit-row">
            Mistake Limit:
            <input id="max-mistakes" type="number" min="1" value="5" disabled>
          </label>
        </div>

        <div id="buttons">
          <button id="start-button">Start</button>
          <button id="reset-button">Reset</button>
        </div>
      </section>

    </div>

    <div class="right-panel">
      <section>
        <div class="play-status-row">
          <div class="play-box">
            <h2>Play</h2>
            <label for="input">Enter digit: </label>
            <input id="input" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
          </div>
          <div class="status-box">
            <h2>Status</h2>
            <p id="mode-display">Current Mode: Practice Mode</p>
            <p id="digit-count">Digits Reached: 0</p>
            <p id="mistake-count">Mistakes: 0</p>
            <p id="message"></p>
          </div>
      </section>

      <section>
        <h2>Entered Digits</h2>
        <div id="pi-display"></div>
      </section>

    </div>



  </div>

  <script src="app.js"></script>
</body>

</html>
